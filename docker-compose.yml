services:

  # ========================= AUTH SERVICE =========================
  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@auth-db:5432/authdb?sslmode=disable
      MASTER_KEY: SUPER_MASTER_KEY_123
    depends_on:
      - auth-db
    networks:
      - app-network

  auth-db:
    image: postgres:15
    container_name: auth-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: authdb
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    networks:
      - app-network

  # ========================= EVALUATION SERVICE =========================
  evaluation-service:
    build: ./evaluation-service
    container_name: evaluation-service
    ports:
      - "8002:8000"
    environment:
      REDIS_HOST: evaluation-redis
      REDIS_PORT: 6379
      FLAG_SERVICE_URL: http://flag-service:8000
      TARGETING_SERVICE_URL: http://targeting-service:8000
      SERVICE_API_KEY: INTERNAL_API_KEY_ABC123
    depends_on:
      - evaluation-redis
      - flag-service
      - targeting-service
    networks:
      - app-network

  evaluation-redis:
    image: redis:7
    container_name: evaluation-redis
    networks:
      - app-network
    volumes:
      - evaluation-redis-data:/data

  # ========================= TARGETING SERVICE =========================
  targeting-service:
    build: ./targeting-service
    container_name: targeting-service
    ports:
      - "8003:8000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@targeting-db:5432/targetingdb?sslmode=disable
    depends_on:
      - targeting-db
    networks:
      - app-network

  targeting-db:
    image: postgres:15
    container_name: targeting-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: targetingdb
    volumes:
      - targeting-db-data:/var/lib/postgresql/data
    networks:
      - app-network

  # ========================= FLAG SERVICE =========================
  flag-service:
    build: ./flag-service
    container_name: flag-service
    ports:
      - "8004:8000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@flag-db:5432/flagdb?sslmode=disable
    depends_on:
      - flag-db
    networks:
      - app-network

  flag-db:
    image: postgres:15
    container_name: flag-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flagdb
    volumes:
      - flag-db-data:/var/lib/postgresql/data
    networks:
      - app-network

  # ========================= ANALYTICS SERVICE =========================
  analytics-service:
    build: ./analytics-service
    container_name: analytics-service
    ports:
      - "8005:8000"
    environment:
      DYNAMODB_ENDPOINT: http://analytics-dynamodb:8000
    depends_on:
      - analytics-dynamodb
    networks:
      - app-network

  analytics-dynamodb:
    image: amazon/dynamodb-local:latest
    container_name: analytics-dynamodb
    ports:
      - "8006:8000"
    volumes:
      - analytics-dynamodb-data:/home/dynamodblocal/data
    networks:
      - app-network

# ========================= NETWORKS & VOLUMES =========================

networks:
  app-network:
    driver: bridge

volumes:
  auth-db-data:
  targeting-db-data:
  flag-db-data:
  evaluation-redis-data:
  analytics-dynamodb-data:
