services:
  # =========================
  # AUTH SERVICE + DATABASE
  # =========================
  auth-db:
    image: postgres:15
    container_name: auth-db
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      retries: 5
    networks:
      - app-net

  auth-service:
    build:
      context: ./auth-service
    container_name: auth-service
    depends_on:
      auth-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@auth-db:5432/authdb?sslmode=disable
      MASTER_KEY: mymasterkey123
    ports:
      - "8001:8000"
    networks:
      - app-net

  # =========================
  # FLAG SERVICE + DATABASE
  # =========================
  flag-db:
    image: postgres:15
    container_name: flag-db
    environment:
      POSTGRES_DB: flagdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - flag_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      retries: 5
    networks:
      - app-net

  flag-service:
    build:
      context: ./flag-service
    container_name: flag-service
    depends_on:
      flag-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@flag-db:5432/flagdb
      FLASK_ENV: production
    ports:
      - "8003:8000"
    networks:
      - app-net

  # =========================
  # TARGETING SERVICE + DATABASE
  # =========================
  targeting-db:
    image: postgres:15
    container_name: targeting-db
    environment:
      POSTGRES_DB: targetingdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - targeting_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      retries: 5
    networks:
      - app-net

  targeting-service:
    build:
      context: ./targeting-service
    container_name: targeting-service
    depends_on:
      targeting-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@targeting-db:5432/targetingdb
      FLASK_ENV: production
    ports:
      - "8004:8000"
    networks:
      - app-net

  # =========================
  # EVALUATION SERVICE + REDIS
  # =========================
  evaluation-redis:
    image: redis:7
    container_name: evaluation-redis
    networks:
      - app-net

  evaluation-service:
    build:
      context: ./evaluation-service
    container_name: evaluation-service
    depends_on:
      - evaluation-redis
    environment:
      REDIS_URL: redis://evaluation-redis:6379
    ports:
      - "8002:8000"
    networks:
      - app-net

  # =========================
  # ANALYTICS SERVICE + DYNAMODB LOCAL
  # =========================
  analytics-dynamodb:
    image: amazon/dynamodb-local
    container_name: analytics-dynamodb
    ports:
      - "8006:8000"
    networks:
      - app-net

  analytics-service:
    build:
      context: ./analytics-service
    container_name: analytics-service
    depends_on:
      - analytics-dynamodb
    environment:
      AWS_REGION: us-east-1
      AWS_SQS_URL: http://analytics-dynamodb:8000
      AWS_DYNAMODB_TABLE: analytics-table
    ports:
      - "8005:8000"
    networks:
      - app-net

# =========================
# VOLUMES
# =========================
volumes:
  auth_db_data:
  flag_db_data:
  targeting_db_data:

# =========================
# NETWORKS
# =========================
networks:
  app-net:
    driver: bridge
